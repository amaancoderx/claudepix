<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>work_type</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; background: #0f0f0f; height: 100%; font-family: "JetBrains Mono", monospace; }
  .stage { width: 100%; height: 100%; display: grid; place-items: center; padding: 8%; box-sizing: border-box; }
  .grid { width: 100%; max-width: 520px; }
</style>
</head>
<body>
  <div class="stage"><div id="grid" class="grid"></div></div>
  <script src="../_shared/creature-engine.js"></script>
  <script>
    const { BODY, CREATURE, patch } = window.PixelEngine;

    // Hands at keyboard: arms lower + hands tap alternately
    // Base creature hands are at row 10, cols 3 and 17.
    // Typing = little vertical twitch of the two hand cells.
    const TYPE_L = patch(CREATURE, [
      [10,3,0],[11,3,BODY],     // left hand down
      // right hand up
      [10,17,BODY],[9,17,BODY],
    ]);
    const TYPE_R = patch(CREATURE, [
      [10,17,0],[11,17,BODY],   // right hand down
      [10,3,BODY],[9,3,BODY],   // left hand up
    ]);

    const PRESET = {
      name: "work_type",
      category: "Work",
      description: "Two-hand typing. Hands alternate up/down on an invisible keyboard.",
      frames: [
        { hold: 160, frame: TYPE_L },
        { hold: 160, frame: TYPE_R },
        { hold: 160, frame: TYPE_L },
        { hold: 160, frame: TYPE_R },
      ],
    };
    window.PRESET = PRESET;
    window.PixelEngine.mount(document.getElementById('grid'), { preset: PRESET });
  </script>
</body>
</html>
