<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>dance_bob</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; background: #0f0f0f; height: 100%; font-family: "JetBrains Mono", monospace; }
  .stage { width: 100%; height: 100%; display: grid; place-items: center; padding: 8%; box-sizing: border-box; }
  .grid { width: 100%; max-width: 520px; }
</style>
</head>
<body>
  <div class="stage"><div id="grid" class="grid"></div></div>
  <script src="../_shared/creature-engine.js"></script>
  <script>
    const { CREATURE, shift } = window.PixelEngine;

    const UP   = shift(CREATURE, -1, 0);
    const DOWN = shift(CREATURE,  0, 0);

    const PRESET = {
      name: "dance_bob",
      category: "Dance",
      description: "Head-bob to an imaginary beat. Up, down, up, down.",
      frames: [
        { hold: 280, frame: DOWN },
        { hold: 280, frame: UP   },
        { hold: 280, frame: DOWN },
        { hold: 280, frame: UP   },
      ],
    };
    window.PRESET = PRESET;
    window.PixelEngine.mount(document.getElementById('grid'), { preset: PRESET });
  </script>
</body>
</html>
